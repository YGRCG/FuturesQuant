# ML 流水线配置
# 修改此文件即可切换数据、特征、模型参数，无需改动代码

data:
  product: FU
  data_dir: raw_data/1min_FU
  cache_dir: cache
  use_continuous: true          # true=连续主力合约, false=单合约
  single_contract: FU2505       # use_continuous=false 时生效
  start_date: "2021-01-01"
  end_date:   "2025-04-30"
  roll_buffer: 30               # 换月节点前后清洗的 bar 数
  freq: "15min"                    # 预测频率: 1min / 5min / 15min / 30min / 1H / 4H / 1D

features:
  lags: [1, 5, 20]              # 对所有因子添加的滞后阶数
  rolling_windows: [20]         # 添加滚动均值/标准差的窗口（bar 数）
  selected_features_file: null  # 筛选特征文件路径（如 ml/selected_features_15min_1.yaml），null=用全量

labels:
  forward_bars: 4               # 预测未来几根 bar 的收益（单位取决于 data.freq）
  label_type: triple_barrier        # regression | classification | triple_barrier
  threshold: 0.003              # 分类标签的阈值（仅 classification 生效）
  # ── triple_barrier 专用参数 ──
  atr_period: 10              # ATR 计算周期
  tp_multiplier: 1.5          # 止盈 = close + tp × ATR
  sl_multiplier: 1.0          # 止损 = close - sl × ATR（盈亏比 = tp/sl）
  # atr_multiplier: 1.5       # 兼容旧配置：未设 tp/sl 时统一使用此值

model:
  type: lightgbm
  params:
    objective: regression
    metric: rmse
    num_leaves: 31
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    min_child_samples: 20
    verbose: -1
  num_boost_round: 500
  early_stopping_rounds: 50

training:
  n_splits: 5                   # 时序交叉验证折数
  gap: 4                        # 训练集与验证集之间的间隔（bar 数），防止标签重叠，必须与forward_bars相同
  # test_size: null             # 每折验证集大小（天），null=自动
  # max_train_size: null        # 每折最大训练集大小（天），null=不限

output:
  artifacts_dir: ml/artifacts   # 模型、OOF 预测、指标的保存路径
